<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDo</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background-color: rgb(27, 27, 27);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
      }
      .container {
        background: #ffffff;
        width: 90%;
        max-width: 500px;
        min-height: 400px;
        border-radius: 20px;
        padding: 30px 20px;
      }

      .container h1 {
        font-family:
          "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
        margin-bottom: 20px;
      }
      .container div {
        background-color: rgb(211, 211, 211);
        border-radius: 40px;
      }
      .container input {
        height: 40px;
        width: 400px;
        min-width: 100px;
        border-radius: 30px;
        border: none;
        padding: 0 30px;
        background: transparent;
        outline: none;
        font-size: 17px;
        margin: 0 5px;
      }
      .addButton {
        border-radius: 40px;
        padding: 16px 30px;
        font-size: 20px;
        border: none;
        background-color: rgb(255, 133, 41);
        cursor: pointer;
      }
      .addButton:hover {
        background-color: rgb(224, 97, 0);
      }
      .addButton:active {
        background-color: rgb(141, 61, 0);
        color: white;
      }

      #list-container {
        text-align: left;
        margin: 15px 10px;
        font-size: 20px;
        color: rgb(59, 59, 59);
        font-family:
          "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
        font-weight: bold;
        width: 450px;
        max-height: 300px;
        overflow-y: auto;
        word-break: break-word;
      }

      ul li {
        list-style: none;
        font-size: 19px;
        padding: 12px 8px 12px 50px;
        user-select: none;
        cursor: pointer;
        max-width: 420px;
        text-wrap: wrap;
        position: relative;
      }

      ul li::before {
        content: "";
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        height: 25px;
        width: 25px;
        border-radius: 50%;
        background-image: url(circle-regular.png);
        background-size: cover;
        background-position: center;
      }

      ul li span {
        position: absolute;
        right: 0;
        width: 30px;
        height: 30px;
        font-size: 22px;
        color: #555;
        text-align: center;
        margin-left: 20px;
        border-radius: 50%;
      }

      ul li span:hover {
        background-color: #ff8543;
      }
      ul li.checked {
        text-decoration: line-through;
        color: rgb(233, 0, 0);
      }

      ul li.checked::before {
        background-image: url(circle-check-solid.png);
      }

      @media (max-width: 550px) {
        ul li {
          width: 80vw;
        }
        .container div {
          width: 80vw;
          overflow: hidden;
        }
        .container {
          width: 95vw;
          overflow-x: hidden;
        }
        ul li span {
          background-color: aqua;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>To-Do List</h1>
      <div style="display: flex; justify-content: center; align-items: center">
        <input type="text" name="input" id="input" placeholder="Enter Task" />
        <button class="addButton" id="button">Add</button>
      </div>
      <ul id="list-container"></ul>
    </div>

    <script src="todo.script.js"></script>
  </body>
</html>
